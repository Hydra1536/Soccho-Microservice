<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your Soccho password">
  <title>Forgot Password - Soccho</title>
  <script src="config.js"></script>
  <script src="static/js/error-handler.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <link rel="stylesheet" href="static/css/auth.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <main class="card w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Reset Password</h1>
      <p class="text-gray-600 text-sm mt-2">Enter your email. We will send an OTP to continue.</p>
    </div>
    
    <form hx-post="/auth/forgot-password" hx-target="#forgot-result" hx-swap="innerHTML" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" class="input-field" required>
      </div>
      <button type="submit" class="btn-primary w-full">Send OTP</button>
    </form>
    
    <div id="forgot-result" class="mt-6"></div>
    
    <div class="mt-8 text-center">
      <a href="index.html" class="text-sm font-medium" style="color: var(--primary);">Back to login</a>
    </div>
  </main>
</body>
</html>
