<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Find and add friends on Soccho">
  <title>Find Friends - Soccho</title>
  <script src="config.js"></script>
  <script src="static/js/error-handler.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="static/css/main.css">
</head>
<body x-data="searchApp()" class="bg-gradient-to-br from-gray-50 to-blue-50 min-h-screen">
  <header class="bg-white shadow-sm sticky top-0 z-50 p-4">
    <div class="flex items-center gap-3 max-w-6xl mx-auto">
      <a href="home.html" class="p-2 rounded-lg hover:bg-gray-100">
        <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="flex-1 relative">
        <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input 
          type="text" 
          x-model="searchQuery"
          hx-get="/social/search"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#search-results"
          hx-indicator="#search-spinner"
          placeholder="Search by name or email..."
          class="input-field pl-10 w-full"
        >
        <div id="search-spinner" class="htmx-indicator absolute right-3 top-1/2 transform -translate-y-1/2">
          <svg class="w-5 h-5 text-gray-400 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v20m10-10H2"/>
          </svg>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto p-4 pt-20 pb-24">
    <!-- Error Message -->
    <div x-show="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3">
      <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
      </svg>
      <span class="text-red-700 text-sm" x-text="errorMessage"></span>
    </div>

    <!-- Search Results Section -->
    <div class="card p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-gray-900" x-text="searchQuery ? `Results for \"${searchQuery}\"` : 'Suggested Friends'"></h3>
      </div>
      
      <!-- Loading State -->
      <div id="search-results" class="space-y-3">
        <div class="skeleton h-20 rounded-lg"></div>
        <div class="skeleton h-20 rounded-lg"></div>
        <div class="skeleton h-20 rounded-lg"></div>
      </div>

      <!-- Error State for Search -->
      <div id="search-error" x-show="searchError" class="text-center py-8">
        <svg class="w-12 h-12 text-gray-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-gray-600 text-sm" x-text="searchError"></p>
      </div>

      <!-- No Results -->
      <div id="no-results" class="text-center py-8" style="display:none;">
        <svg class="w-12 h-12 text-gray-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <p class="text-gray-600">No friends found matching your search</p>
      </div>

      <!-- Load More Button -->
      <div id="load-more" class="text-center mt-8">
        <button hx-get="/social/search?cursor=next" hx-target="#search-results" hx-swap="beforeend" class="btn-primary py-2 px-6 text-sm">
          Show More
        </button>
      </div>
    </div>
  </main>

  <!-- Mobile Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around md:hidden">
    <a href="home.html" class="flex-1 flex flex-col items-center p-3 text-gray-500 hover:text-gray-700">
      <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
      </svg>
      <span class="text-xs">Home</span>
    </a>
    <a href="find-friends.html" class="flex-1 flex flex-col items-center p-3 text-blue-600 font-semibold">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4a4 4 0 110 8 4 4 0 010-8zm0 12c-5 0-8 2.5-8 5v3h16v-3c0-2.5-3-5-8-5z"/>
      </svg>
      <span class="text-xs">Find Friends</span>
    </a>
    <a href="profile.html" class="flex-1 flex flex-col items-center p-3 text-gray-500 hover:text-gray-700">
      <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-6-3a2 2 0 11-4 0 2 2 0 014 0zm-2 4a5 5 0 00-4.546 2.916A5.986 5.986 0 0010 16a5.986 5.986 0 004.546-2.084A5 5 0 0010 11z"/>
      </svg>
      <span class="text-xs">Profile</span>
    </a>
  </nav>

  <script>
    function searchApp() {
      return {
        searchQuery: '',
        errorMessage: '',
        searchError: '',
        init() {
          // Set up HTMX error handling
          document.body.addEventListener('htmx:responseError', (evt) => {
            this.searchError = 'Failed to search. Please try again.';
            this.errorMessage = 'Connection error. Please check your internet connection.';
            console.error('Search error:', evt.detail);
          });

          document.body.addEventListener('htmx:sendError', (evt) => {
            this.errorMessage = 'Network error. Please check your connection.';
          });
        }
      }
    }
  </script>
</body>
</html>
  <header class="bg-white shadow-sm sticky top-0 z-50 p-4">
    <div class="flex items-center gap-3">
      <a href="home.html" class="p-2 rounded-xl hover:bg-gray-100">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="flex-1 relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <input 
          type="text" 
          x-model="searchQuery"
          hx-get="/social/search"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#search-results"
          hx-indicator="#loading"
          placeholder="Search friends..."
          class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-accent focus:border-transparent"
        >
        <div id="loading" class="htmx-indicator absolute right-3 inset-y-0 flex items-center">
          <div class="skeleton w-4 h-4 rounded-full"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="container mx-auto p-4 pt-20 pb-20">
    <!-- Recent Searches -->
    <div x-show="showRecent" class="card p-6 mb-6">
      <h3 class="text-lg font-bold mb-4">Recent Searches</h3>
      <div class="flex flex-wrap gap-2" id="recent-searches">
        <!-- Load recent via HTMX -->
      </div>
    </div>

    <!-- Search Results -->
    <div class="card p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold" x-text="searchQuery ? `Results for \"${searchQuery}\"` : 'Suggested Friends'"></h3>
        <button class="text-muted hover:text-gray-700" @click="showRecent = !showRecent">
          <svg x-show="!showRecent" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
          </svg>
        </button>
      </div>
      <div id="search-results" class="space-y-4">
        <!-- Results load here -->
        <div class="skeleton h-20 rounded-xl"></div>
        <div class="skeleton h-20 rounded-xl"></div>
        <div class="skeleton h-20 rounded-xl"></div>
      </div>
      <div id="load-more" class="text-center mt-8">
        <button hx-get="/social/search?cursor=next" hx-target="#search-results" hx-swap="beforeend" class="btn-secondary">
          Show More
        </button>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="home.html" class="flex flex-col items-center p-2 text-accent">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
      </svg>
      <span class="text-xs mt-1">Home</span>
    </a>
    <a href="find-friends.html" class="flex flex-col items-center p-2 text-accent relative">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
        <path d="M9 9a2 2 0 114 0 2 2 0 01-4 0z"/>
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-13a4 4 0 00-3.446 6.032l-1.261 1.26a4 4 0 103.69 6.415 4 4 0 00.611-6.976l1.262-1.26a4 4 0 10-3.69-6.415l1.261-1.261A4 4 0 1011 5z"/>
      </svg>
      <span class="text-xs mt-1">Friends</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center p-2 text-gray-500">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-6-3a2 2 0 11-4 0 2 2 0 014 0zm-2 4a5 5 0 00-4.546 2.916A5.986 5.986 0 0010 16a5.986 5.986 0 004.546-2.084A5 5 0 0010 11z"/>
      </svg>
      <span class="text-xs mt-1">Profile</span>
    </a>
  </nav>

  <script>
    // Load recent searches on focus
    document.querySelector('input[type="text"]').addEventListener('focus', () => {
      htmx.ajax('GET', '/social/search-history', {target: '#recent-searches'});
    });
  </script>
</body>
</html>
