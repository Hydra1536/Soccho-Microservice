<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register for Soccho - Money management made easy.">
  <title>Register - Soccho</title>
  <script src="config.js"></script>
  <script src="static/js/error-handler.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="static/css/auth.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="card w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Join Soccho</h1>
      <p class="text-gray-600 text-sm mt-2">Create your account to get started</p>
    </div>

    <form hx-post="/auth/register" hx-target="#result" hx-swap="innerHTML" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
        <input type="text" name="username" placeholder="John Doe" class="input-field" required>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
        <input type="email" name="email" placeholder="your@email.com" class="input-field" required>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
        <input type="password" name="password" placeholder="Create a strong password" class="input-field" required minlength="6">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Confirm password" class="input-field" required minlength="6">
      </div>
      <button type="submit" class="btn-primary w-full">Create Account</button>
    </form>
    
    <div id="result" class="mt-6"></div>
    
    <div class="mt-8 text-center">
      <a href="index.html" class="text-sm font-medium">Already have an account? <span style="color: var(--primary);">Login</span></a>
    </div>
  </div>

  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
</body>
</html>
