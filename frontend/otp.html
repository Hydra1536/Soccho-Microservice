<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification - Soccho</title>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <link rel="stylesheet" href="static/css/main.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-50 min-h-screen flex items-center justify-center p-4">
  <main class="card max-w-md w-full p-8">
    <h1 class="text-2xl font-bold mb-2">Verify Your Email</h1>
    <p class="text-muted mb-6">Enter the 6-digit OTP sent to your email.</p>
    <form hx-post="/auth/otp-verify" hx-target="#otp-result" class="space-y-4">
      <label class="block">
        <span class="block text-sm font-medium mb-2">Email</span>
        <input type="email" name="email" required class="w-full input-field">
      </label>
      <label class="block">
        <span class="block text-sm font-medium mb-2">OTP</span>
        <input type="text" name="otp" minlength="6" maxlength="6" required class="w-full input-field">
      </label>
      <button type="submit" class="w-full btn-primary">Verify & Continue</button>
    </form>
    <div id="otp-result" class="mt-4"></div>
    <a href="index.html" class="block mt-6 text-sm text-accent">Back to login</a>
  </main>
</body>
</html>
