<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soccho - Money Management Made Easy</title>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --primary: #00B87D;
      --primary-light: #20D9A3;
      --primary-dark: #00945A;
      --secondary-pink: #FF6B9D;
      --secondary-yellow: #FFD166;
      --secondary-purple: #9D5DDE;
      --gray-light: #F8F9FA;
      --gray-border: #E0E6ED;
    }

    * {
      --tw-ring-color: var(--primary);
    }

    body {
      background: linear-gradient(135deg, var(--gray-light) 0%, #F0F8F5 100%);
      min-height: 100vh;
    }

    .btn-primary {
      @apply bg-[#00B87D] hover:bg-[#00945A] text-white font-semibold py-3 px-4 rounded-2xl transition-all duration-200 shadow-sm hover:shadow-md active:scale-95;
    }

    .btn-outline {
      @apply border-2 border-gray-300 hover:border-[#00B87D] text-gray-800 font-semibold py-3 px-4 rounded-2xl transition-all duration-200;
    }

    .input-field {
      @apply w-full px-4 py-3 border-2 border-[#E0E6ED] rounded-2xl focus:outline-none focus:border-[#00B87D] focus:ring-2 focus:ring-[#00B87D]/20 transition-all duration-200;
    }

    .card {
      @apply bg-white rounded-2xl shadow-sm border border-[#E0E6ED] p-6 transition-all duration-200;
    }

    .card:hover {
      @apply shadow-md border-[#00B87D]/30;
    }

    .tab-active {
      @apply text-[#00B87D] border-b-2 border-[#00B87D];
    }

    .tab-inactive {
      @apply text-gray-500 hover:text-gray-700;
    }

    .error-message {
      @apply text-[#FF6B9D] text-sm font-medium;
    }

    .success-message {
      @apply text-[#00B87D] text-sm font-medium;
    }

    .loading {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div x-data="authApp()" class="min-h-screen flex items-center justify-center p-4">
    <!-- Main Card -->
    <div class="card w-full max-w-md">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-block p-3 bg-gradient-to-br from-[#00B87D] to-[#20D9A3] rounded-full mb-4">
          <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-900">Soccho</h1>
        <p class="text-gray-600 text-sm mt-2">Money management made easy</p>
      </div>

      <!-- Alerts -->
      <div x-show="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-xl flex items-start gap-3">
        <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        <span class="text-red-700 text-sm" x-text="errorMessage"></span>
      </div>

      <div x-show="successMessage" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-xl flex items-start gap-3">
        <svg class="w-5 h-5 text-green-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span class="text-green-700 text-sm" x-text="successMessage"></span>
      </div>

      <!-- Tabs -->
      <div class="flex gap-6 mb-8 border-b-2 border-gray-200">
        <button @click="switchTab('login')" :class="tab === 'login' ? 'tab-active' : 'tab-inactive'" class="pb-3 font-semibold text-sm transition-colors">
          Login
        </button>
        <button @click="switchTab('register')" :class="tab === 'register' ? 'tab-active' : 'tab-inactive'" class="pb-3 font-semibold text-sm transition-colors">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <form x-show="tab === 'login'" @submit.prevent="handleLogin" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
          <input 
            type="email" 
            x-model="loginForm.email" 
            placeholder="your@email.com"
            class="input-field"
            required
            :disabled="isLoading"
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
          <input 
            type="password" 
            x-model="loginForm.password" 
            placeholder="Enter your password"
            class="input-field"
            required
            :disabled="isLoading"
          >
        </div>

        <button 
          type="submit" 
          class="btn-primary w-full flex items-center justify-center gap-2"
          :disabled="isLoading"
        >
          <span x-show="!isLoading">Login</span>
          <span x-show="isLoading" class="loading">●●●</span>
        </button>

        <a href="forgot-password.html" class="block text-center text-sm text-[#00B87D] hover:text-[#00945A] font-medium transition-colors">
          Forgot password?
        </a>
      </form>

      <!-- Register Form -->
      <form x-show="tab === 'register'" @submit.prevent="handleRegister" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
          <input 
            type="text" 
            x-model="registerForm.username" 
            placeholder="John Doe"
            class="input-field"
            required
            :disabled="isLoading"
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
          <input 
            type="email" 
            x-model="registerForm.email" 
            placeholder="your@email.com"
            class="input-field"
            required
            :disabled="isLoading"
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
          <input 
            type="password" 
            x-model="registerForm.password" 
            placeholder="Create a strong password"
            class="input-field"
            required
            :disabled="isLoading"
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
          <input 
            type="password" 
            x-model="registerForm.password_confirm" 
            placeholder="Confirm password"
            class="input-field"
            required
            :disabled="isLoading"
          >
        </div>

        <button 
          type="submit" 
          class="btn-primary w-full flex items-center justify-center gap-2"
          :disabled="isLoading"
        >
          <span x-show="!isLoading">Create Account</span>
          <span x-show="isLoading" class="loading">●●●</span>
        </button>

        <p class="text-sm text-gray-600 text-center">
          By signing up, you agree to our <a href="#" class="text-[#00B87D] hover:underline">Terms of Service</a>
        </p>
      </form>

      <!-- Divider -->
      <div x-show="tab === 'login'" class="my-6 flex items-center gap-3">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-sm text-gray-500">or</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Google OAuth -->
      <button 
        x-show="tab === 'login'"
        @click="handleGoogleLogin"
        class="btn-outline w-full flex items-center justify-center gap-2"
        :disabled="isLoading"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#1F2937"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span>Continue with Google</span>
      </button>
    </div>
  </div>

  <script>
    function authApp() {
      return {
        tab: 'login',
        isLoading: false,
        errorMessage: '',
        successMessage: '',
        
        loginForm: {
          email: '',
          password: '',
        },
        
        registerForm: {
          username: '',
          email: '',
          password: '',
          password_confirm: '',
        },

        switchTab(newTab) {
          this.tab = newTab;
          this.errorMessage = '';
          this.successMessage = '';
        },

        async handleLogin() {
          this.errorMessage = '';
          this.successMessage = '';

          if (!this.loginForm.email || !this.loginForm.password) {
            this.errorMessage = 'Please fill in all fields';
            return;
          }

          this.isLoading = true;

          try {
            const response = await fetch('https://soccho-gateway.onrender.com/auth/login', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(this.loginForm),
              credentials: 'include',
            });

            const data = await response.json();

            if (response.ok) {
              this.successMessage = 'Login successful! Redirecting...';
              localStorage.setItem('authToken', data.token || '');
              setTimeout(() => {
                window.location.href = '/home.html';
              }, 1500);
            } else {
              this.errorMessage = data.detail || 'Login failed. Please try again.';
            }
          } catch (error) {
            console.error('Login error:', error);
            this.errorMessage = 'Connection error. Please check your internet connection.';
          } finally {
            this.isLoading = false;
          }
        },

        async handleRegister() {
          this.errorMessage = '';
          this.successMessage = '';

          // Validation
          if (!this.registerForm.username || !this.registerForm.email || !this.registerForm.password) {
            this.errorMessage = 'Please fill in all fields';
            return;
          }

          if (this.registerForm.password !== this.registerForm.password_confirm) {
            this.errorMessage = 'Passwords do not match';
            return;
          }

          if (this.registerForm.password.length < 6) {
            this.errorMessage = 'Password must be at least 6 characters';
            return;
          }

          this.isLoading = true;

          try {
            const response = await fetch('https://soccho-gateway.onrender.com/auth/register', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                username: this.registerForm.username,
                email: this.registerForm.email,
                password: this.registerForm.password,
              }),
              credentials: 'include',
            });

            const data = await response.json();

            if (response.ok) {
              this.successMessage = 'Account created successfully! Logging in...';
              localStorage.setItem('authToken', data.token || '');
              setTimeout(() => {
                window.location.href = '/home.html';
              }, 1500);
            } else {
              this.errorMessage = data.detail || 'Registration failed. Please try again.';
            }
          } catch (error) {
            console.error('Registration error:', error);
            this.errorMessage = 'Connection error. Please check your internet connection.';
          } finally {
            this.isLoading = false;
          }
        },

        handleGoogleLogin() {
          window.location.href = 'https://soccho-gateway.onrender.com/auth/google/login';
        },

        init() {
          console.log('[AuthApp] Initialized with:', {
            gatewayUrl: 'https://soccho-gateway.onrender.com',
            authUrl: 'https://soccho-gateway.onrender.com',

          });

          // Register service worker
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/sw.js').catch(err => {
              console.log('[AuthApp] Service Worker registration failed:', err);
            });
          }
        }
      }
    }
  </script>
</body>
</html>
