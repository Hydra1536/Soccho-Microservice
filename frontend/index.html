<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soccho - Login</title>
  <script src="config.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="static/css/main.css">
  <link rel="manifest" href="manifest.json">
</head>
<body x-data="{ tab: 'login', email: '', password: '' }" class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 w-full max-w-md transform hover:-translate-y-2 transition-all duration-300">
    <!-- Tabs -->
    <div class="flex mb-6">
      <button @click="tab='login'" :class="tab === 'login' ? 'border-b-2 border-indigo-500 text-indigo-600' : 'text-gray-500'" class="flex-1 py-2 font-semibold">Login</button>
      <button @click="tab='register'" :class="tab === 'register' ? 'border-b-2 border-indigo-500 text-indigo-600' : 'text-gray-500'" class="flex-1 py-2 font-semibold">Register</button>
    </div>

    <!-- Login Form -->
    <form x-show="tab === 'login'" hx-post="/auth/login" hx-target="#result" hx-swap="innerHTML">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" x-model="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" x-model="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-3 px-4 rounded-xl font-semibold shadow-lg hover:shadow-xl transform hover:scale-[1.02] transition-all duration-200">Login</button>
        <a href="forgot-password.html" class="block text-center text-sm text-indigo-600 hover:text-indigo-500 mt-2">Forgot Password?</a>
      </div>
    </form>

    <!-- Register Form -->
    <form x-show="tab === 'register'" hx-post="/auth/register" hx-target="#result" hx-swap="innerHTML">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
          <input type="text" name="username" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
          <input type="password" name="confirm_password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-3 px-4 rounded-xl font-semibold shadow-lg hover:shadow-xl transform hover:scale-[1.02] transition-all duration-200">Register</button>
      </div>
    </form>

    <div id="result" class="mt-4 min-h-[20px]"></div>

    <!-- Google OAuth -->
    <div class="mt-6 pt-6 border-t border-gray-200">
      <button hx-get="/auth/google/login" hx-target="body" hx-swap="outerHTML" class="w-full flex items-center justify-center gap-2 px-4 py-3 border border-gray-300 rounded-xl hover:bg-gray-50 transition-all">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/js/sw.js');
    }
  </script>
</body>
</html>
