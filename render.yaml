services:
  - name: soccho-gateway
    type: web
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m grpc_tools.protoc -I shared/proto --python_out=. --grpc_python_out=. shared/proto/soccho.proto
    startCommand: uvicorn gateway.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUTH_GRPC_HOST
        value: soccho-auth
      - key: SOCIAL_GRPC_HOST
        value: soccho-social
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://soccho.vercel.app

  - name: soccho-auth
    type: web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn auth_service.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anon_chat
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: AES_SECRET_KEY
        sync: false

  - name: soccho-social
    type: web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn social_service.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anon_chat
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString

  - name: soccho-transaction
    type: web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn transaction_service.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anon_chat
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString

  - name: soccho-notification
    type: web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT notification_service.asgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anon_chat
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString

  - name: soccho-admin
    type: web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn admin_service.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anon_chat
          property: connectionString

  - name: soccho-celery-worker
    type: worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A transaction_service worker --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: anon_chat
          property: connectionString

  - name: soccho-celery-beat
    type: worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A transaction_service beat --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString

  - name: soccho-redis
    type: redis

databases:
  - name: anon_chat

