services:
  - name: soccho-gateway
    type: web
    runtime: python
    buildCommand: pip install -r gateway/requirements.txt && python -m grpc_tools.protoc -I shared/proto --python_out=shared --grpc_python_out=shared shared/proto/soccho.proto
    startCommand: gunicorn gateway.main:app --bind 0.0.0.0:$PORT --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 120
    numInstances: 1
    envVars:
      - key: AUTH_SERVICE_URL
        value: https://soccho-auth.onrender.com
      - key: SOCIAL_SERVICE_URL
        value: https://soccho-social.onrender.com
      - key: TRANSACTION_SERVICE_URL
        value: https://soccho-transaction.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        value: https://soccho-notification.onrender.com
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GATEWAY_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://soccho.vercel.app,https://www.soccho.vercel.app
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"

  - name: soccho-auth
    type: web
    runtime: python
    buildCommand: pip install -r auth_service/requirements.txt && cd auth_service && python manage.py migrate --noinput
    startCommand: cd auth_service && gunicorn auth_service.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: AUTH_SECRET_KEY
        sync: false
      - key: AES_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_HOSTS
        value: "soccho-auth.onrender.com,localhost"

  - name: soccho-social
    type: web
    runtime: python
    buildCommand: pip install -r social_service/requirements.txt && cd social_service && python manage.py migrate --noinput
    startCommand: cd social_service && gunicorn social_service.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: SOCIAL_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_HOSTS
        value: "soccho-social.onrender.com,localhost"

  - name: soccho-transaction
    type: web
    runtime: python
    buildCommand: pip install -r transaction_service/requirements.txt && cd transaction_service && python manage.py migrate --noinput
    startCommand: cd transaction_service && gunicorn transaction_service.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: TRANSACTION_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_HOSTS
        value: "soccho-transaction.onrender.com,localhost"

  - name: soccho-notification
    type: web
    runtime: python
    buildCommand: pip install -r notification_service/requirements.txt && cd notification_service && python manage.py migrate --noinput
    startCommand: cd notification_service && daphne -b 0.0.0.0 -p $PORT notification_service.asgi:application
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: NOTIFICATION_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_HOSTS
        value: "soccho-notification.onrender.com,localhost"

  - name: soccho-admin
    type: web
    runtime: python
    buildCommand: pip install -r admin_service/requirements.txt && cd admin_service && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: cd admin_service && gunicorn admin_service.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_HOSTS
        value: "soccho-admin.onrender.com,localhost"

  - name: soccho-celery-worker
    type: worker
    runtime: python
    buildCommand: pip install -r transaction_service/requirements.txt
    startCommand: cd transaction_service && celery -A transaction_service worker --loglevel=info --concurrency=4
    numInstances: 1
    envVars:
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"

  - name: soccho-celery-beat
    type: worker
    runtime: python
    buildCommand: pip install -r transaction_service/requirements.txt
    startCommand: cd transaction_service && celery -A transaction_service beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    numInstances: 1
    envVars:
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"

  - name: soccho-redis
    type: redis
    version: "7"

databases:
  - name: soccho_db
    engine: postgres
    version: "16"
    plan: free
    postgresSQLVersion: "16"

