# Render.yaml - Native Python runtime (NO Docker)
# Monorepo deployment with pip install from service-specific requirements.txt

services:
  # ========== API GATEWAY ==========
  - name: soccho-gateway
    type: web
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn gateway.main:app --bind 0.0.0.0:$PORT --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 120
    envVars:
      - key: AUTH_SERVICE_URL
        value: https://soccho-auth.onrender.com/api
      - key: SOCIAL_SERVICE_URL
        value: https://soccho-social.onrender.com/api
      - key: TRANSACTION_SERVICE_URL
        value: https://soccho-transaction.onrender.com/api
      - key: NOTIFICATION_SERVICE_URL
        value: https://soccho-notification.onrender.com/api
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: GATEWAY_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://soccho.vercel.app,https://www.soccho.vercel.app

  # ========== AUTH SERVICE ==========
  - name: soccho-auth
    type: web
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd auth_service && python manage.py migrate --noinput && gunicorn auth_service.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: AUTH_SECRET_KEY
        sync: false
      - key: AES_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: soccho-auth.onrender.com

  # ========== SOCIAL SERVICE ==========
  - name: soccho-social
    type: web
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd social_service && python manage.py migrate --noinput && gunicorn social_service.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: SOCIAL_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: soccho-social.onrender.com

  # ========== TRANSACTION SERVICE ==========
  - name: soccho-transaction
    type: web
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd transaction_service && python manage.py migrate --noinput && gunicorn transaction_service.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: TRANSACTION_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: soccho-transaction.onrender.com

  # ========== NOTIFICATION SERVICE ==========
  - name: soccho-notification
    type: web
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd notification_service && python manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT notification_service.asgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: NOTIFICATION_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: soccho-notification.onrender.com

  # ========== ADMIN SERVICE ==========
  - name: soccho-admin
    type: web
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd admin_service && python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn admin_service.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: soccho-admin.onrender.com

  # ========== CELERY WORKER ==========
  - name: soccho-celery-worker
    type: worker
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd transaction_service && celery -A transaction_service worker --loglevel=info --concurrency=4
    envVars:
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString

  # ========== CELERY BEAT ==========
  - name: soccho-celery-beat
    type: worker
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd transaction_service && celery -A transaction_service beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: REDIS_URL
        fromService:
          name: soccho-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: soccho_db
          property: connectionString

  # ========== REDIS CACHE ==========
  - name: soccho-redis
    type: redis
    version: "7"

# ========== POSTGRESQL DATABASE ==========
databases:
  - name: soccho_db
    engine: postgres
    version: "16"
