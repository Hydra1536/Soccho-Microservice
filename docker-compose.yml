version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: soccho
      POSTGRES_USER: soccho
      POSTGRES_PASSWORD: soccho
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://soccho:soccho@postgres:5432/soccho
      REDIS_URL: redis://redis:6379

  auth:
    build: ./auth_service
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis

  social:
    build: ./social_service
    ports:
      - "8002:8000"
    depends_on:
      - postgres
      - redis

  transaction:
    build: ./transaction_service
    ports:
      - "8003:8000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:

